<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="theme-color" content="#080808"/>
<title>BizPro — Share</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--g:#C9A84C;--gl:#E4C870;--bg:#080808;--c1:#101010;--c2:#181818;--br:rgba(201,168,76,.18);--tx:#EAE4D8;--mu:#666;--re:#E05555}
body{background:var(--bg);color:var(--tx);font-family:'Outfit',sans-serif;min-height:100vh}
.sr{font-family:'Cormorant Garamond',serif}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.up{animation:up .4s ease both}
/* Header */
.hdr{background:rgba(8,8,8,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--br);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Cormorant Garamond',serif;font-size:20px;text-decoration:none}
.logo b{color:var(--g);font-weight:400}.logo i{color:var(--tx);font-style:normal;font-weight:300}
/* Loading */
#loading{min-height:80vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.spn{width:32px;height:32px;border:3px solid var(--br);border-top-color:var(--g);border-radius:50%;animation:spin .8s linear infinite}
/* Cards */
.wrap{max-width:900px;margin:0 auto;padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-bottom:32px}
.card{background:var(--c1);border:1px solid var(--br);border-radius:14px;overflow:hidden}
.thumb{height:180px;background:var(--c2);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.thumb img{width:100%;height:100%;object-fit:cover}
.thumb iframe{width:100%;height:100%;border:none;pointer-events:none}
.tbadge{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.7);border-radius:5px;padding:2px 8px;font-size:10px;color:var(--g);text-transform:uppercase;letter-spacing:1px}
.info{padding:14px}
.lbl{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--g);display:block;margin-bottom:3px}
.btn-g{background:linear-gradient(135deg,var(--g),var(--gl));color:#000;font-family:'Outfit',sans-serif;font-weight:700;font-size:13px;border:none;border-radius:10px;padding:10px;width:100%;cursor:pointer;margin-top:10px}
.btn-o{background:transparent;color:var(--g);border:1px solid var(--br);border-radius:8px;padding:7px 12px;font-family:'Outfit',sans-serif;font-size:13px;cursor:pointer;margin-top:6px;width:100%}
/* Preview fullscreen */
#pv{position:fixed;inset:0;background:#000;z-index:100;display:none;flex-direction:column}
#pv-bar{background:rgba(8,8,8,.95);padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--br);padding-top:max(12px,env(safe-area-inset-top))}
#pv-body{flex:1;overflow:auto;background:#111;display:flex;align-items:flex-start;justify-content:center}
/* User cards */
.ucard{background:var(--c1);border:1px solid var(--br);border-radius:14px;overflow:hidden}
.av{width:40px;height:40px;border-radius:50%;background:rgba(201,168,76,.2);color:var(--g);font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--br),transparent);margin:8px 0 20px}
</style>
</head>
<body>

<header class="hdr">
  <a class="logo" href="./"><b>BIZ</b><i>PRO</i></a>
  <div style="font-size:12px;color:var(--mu)">📋 เอกสารบริษัท</div>
</header>

<div id="loading">
  <div class="spn"></div>
  <div style="color:var(--mu);font-size:13px">กำลังโหลด…</div>
</div>

<div id="content" style="display:none">
  <div class="wrap">
    <div class="up" style="text-align:center;padding:32px 0 24px">
      <div class="sr" style="font-size:36px;font-weight:300;margin-bottom:8px">KGS <em style="color:var(--g)">Documents</em></div>
      <div style="font-size:13px;color:var(--mu)">ดูและดาวน์โหลดเอกสารได้เลย · ไม่ต้องสมัครสมาชิก</div>
    </div>

    <!-- Company Docs -->
    <div style="margin-bottom:8px"><span class="lbl">เอกสารบริษัท</span><div class="sr" style="font-size:22px;font-weight:300">Company Documents</div></div>
    <div class="divider"></div>
    <div class="grid" id="docs-grid"></div>

    <!-- Business Cards -->
    <div style="margin-bottom:8px"><span class="lbl">ทีมงาน</span><div class="sr" style="font-size:22px;font-weight:300">Business Cards</div></div>
    <div class="divider"></div>
    <div class="grid" id="cards-grid"></div>
    <div id="no-cards" style="display:none;text-align:center;padding:30px 0;color:var(--mu)">ยังไม่มีนามบัตร</div>
  </div>
</div>

<!-- Preview fullscreen -->
<div id="pv">
  <div id="pv-bar">
    <button onclick="cpv()" style="background:rgba(255,255,255,.1);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0">←</button>
    <div style="flex:1;min-width:0">
      <div class="sr" style="font-size:16px;color:var(--g);overflow:hidden;text-overflow:ellipsis;white-space:nowrap" id="pv-t"></div>
      <div style="font-size:11px;color:var(--mu)" id="pv-f"></div>
    </div>
    <button onclick="dlNow()" style="background:linear-gradient(135deg,var(--g),var(--gl));border:none;color:#000;font-weight:700;font-family:'Outfit',sans-serif;font-size:13px;padding:9px 16px;border-radius:10px;cursor:pointer;flex-shrink:0">↓ ดาวน์โหลด</button>
  </div>
  <div id="pv-body"></div>
</div>

<script>
const DB_CFG = {
  apiKey:            "AIzaSyBErsdboNThMZOLoJdN8Mf3lDJq80DuxaE",
  authDomain:        "business-infos-155f8.firebaseapp.com",
  databaseURL:       "https://business-infos-155f8-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "business-infos-155f8",
  appId:             "1:752710011890:web:da84ae37d0732c4e7f396b"
};
const fapp = firebase.initializeApp(DB_CFG);
const db   = firebase.database(fapp);
let CUR = null;

const $ = id => document.getElementById(id);
const es = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const ic = m => !m?'📄':m.startsWith('image/')?'🖼':m==='application/pdf'?'📋':'📄';
const sf = s => !s?'':s.length>24?s.slice(0,24)+'…':s;
const sz = b => !b?'':b<1048576?(b/1024).toFixed(1)+' KB':(b/1048576).toFixed(1)+' MB';

function dlf(data,name,mime){
  const b=atob(data),a=new Uint8Array(b.length);
  for(let i=0;i<b.length;i++)a[i]=b.charCodeAt(i);
  const u=URL.createObjectURL(new Blob([a],{type:mime}));
  const el=document.createElement('a');el.href=u;el.download=name;el.click();
  setTimeout(()=>URL.revokeObjectURL(u),2000);
}

function openPV(f, title){
  CUR = f;
  $('pv-t').textContent = title;
  $('pv-f').textContent = f.name;
  const body = $('pv-body'); body.innerHTML = '';
  const src = `data:${f.mimeType};base64,${f.base64}`;
  if(f.mimeType?.startsWith('image/')){
    body.innerHTML = `<img src="${src}" style="width:100%;height:auto;display:block">`;
    body.style.cssText = 'flex:1;overflow:auto;background:#111;display:flex;align-items:flex-start;justify-content:center';
  } else if(f.mimeType === 'application/pdf'){
    body.innerHTML = `<iframe src="${src}#view=FitH&toolbar=0&navpanes=0" style="width:100%;height:100%;min-height:100vh;border:none;display:block"></iframe>`;
    body.style.cssText = 'flex:1;overflow:hidden;display:flex;flex-direction:column;background:#525659';
  }
  $('pv').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function cpv(){
  $('pv').style.display = 'none';
  $('pv-body').innerHTML = '';
  document.body.style.overflow = '';
}

function dlNow(){ if(CUR) dlf(CUR.base64, CUR.name, CUR.mimeType); }

function mkDocCard(d, f){
  const el = document.createElement('div'); el.className = 'card up';
  let thumb = '';
  if(!f){ thumb = `<div style="text-align:center;opacity:.3"><div style="font-size:46px">📄</div><div style="font-size:12px;color:var(--mu);margin-top:6px">ยังไม่มีไฟล์</div></div>`; }
  else if(f.mimeType?.startsWith('image/')){ thumb = `<img src="data:${f.mimeType};base64,${f.base64}" style="width:100%;height:100%;object-fit:cover">`; }
  else if(f.mimeType === 'application/pdf'){ thumb = `<iframe src="data:${f.mimeType};base64,${f.base64}#page=1&toolbar=0&navpanes=0&scrollbar=0" style="width:100%;height:100%;border:none;pointer-events:none"></iframe>`; }
  else { thumb = `<div style="text-align:center"><div style="font-size:46px">${ic(f.mimeType)}</div><div style="font-size:12px;color:var(--g);margin-top:8px">${sf(f.name)}</div></div>`; }
  el.innerHTML = `
    <div class="thumb" style="cursor:pointer" onclick="${f?`openPV(${JSON.stringify(f).replace(/"/g,"'").replace(/'/g,"\\'")}, '${d.en}')`:''}">${thumb}${f?`<div class="tbadge">${(f.mimeType?.split('/')[1]||'').toUpperCase()}</div>`:''}</div>
    <div class="info">
      <span class="lbl">${d.th}</span>
      <div class="sr" style="font-size:18px;font-weight:400;margin-bottom:2px">${d.en}</div>
      <div style="font-size:12px;color:var(--mu)">${f?sz(f.size):'ไม่มีไฟล์'}</div>
      ${f?`<button class="btn-g" onclick='openPV(JSON.parse(this.dataset.f),"${d.en}")' data-f='${JSON.stringify(f)}'>Preview</button><button class="btn-o" onclick='dlf("${f.base64.substring(0,10)}","${f.name}","${f.mimeType}")' onclick="dlNow()">↓ ดาวน์โหลด</button>`:''}
    </div>`;
  // Fix onclick for buttons
  if(f){
    const btns = el.querySelectorAll('button');
    btns[0].onclick = () => openPV(f, d.en);
    btns[1].onclick = () => dlf(f.base64, f.name, f.mimeType);
  }
  return el;
}

function mkBCCard(uid, f){
  const el = document.createElement('div'); el.className = 'card up';
  const av = (f.userName||'?').charAt(0).toUpperCase();
  let thumb = '';
  if(f.mimeType?.startsWith('image/')){ thumb = `<img src="data:${f.mimeType};base64,${f.base64}" style="width:100%;height:100%;object-fit:cover">`; }
  else { thumb = `<div style="text-align:center"><div style="font-size:46px">${ic(f.mimeType)}</div><div style="font-size:12px;color:var(--g);margin-top:8px">${sf(f.name)}</div></div>`; }
  el.innerHTML = `
    <div class="thumb">${thumb}<div class="tbadge">${(f.mimeType?.split('/')[1]||'FILE').toUpperCase()}</div></div>
    <div class="info">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div class="av">${av}</div>
        <div><div style="font-weight:500">${es(f.userName||'')}</div><div style="font-size:12px;color:var(--mu)">${es(f.userPos||'')}</div></div>
      </div>
    </div>`;
  const btn1 = document.createElement('button'); btn1.className='btn-g'; btn1.style.margin='0 14px 6px'; btn1.textContent='Preview'; btn1.onclick=()=>openPV(f, f.userName+' — Business Card');
  const btn2 = document.createElement('button'); btn2.className='btn-o'; btn2.style.margin='0 14px 14px'; btn2.textContent='↓ ดาวน์โหลด'; btn2.onclick=()=>dlf(f.base64,f.name,f.mimeType);
  el.appendChild(btn1); el.appendChild(btn2);
  return el;
}

async function load(){
  const DOCS = [{k:'cp',en:'Company Profile',th:'โปรไฟล์บริษัท'},{k:'br',en:'Brochure',th:'โบรชัวร์'}];
  for(const d of DOCS){
    const s = await db.ref('docs/'+d.k).once('value');
    $('docs-grid').appendChild(mkDocCard(d, s.exists()?s.val():null));
  }
  const cs = await db.ref('bizCards').once('value');
  if(!cs.exists()){ $('no-cards').style.display='block'; }
  else { cs.forEach(c => $('cards-grid').appendChild(mkBCCard(c.key, c.val()))); }
  $('loading').style.display='none';
  $('content').style.display='block';
}

load();
</script>
</body>
</html>
